name: Bump Version

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  bump:
    name: Bump patch version
    runs-on: ubuntu-latest
    # Skip if the push itself is a version bump commit (contains [skip ci])
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync tags with remote
        run: |
          git tag -l | xargs git tag -d
          git fetch --tags

      - name: Restore uv.lock
        run: git checkout -- uv.lock

      - name: DEBUG Git status and diff
        if: always()
        run: |
          git status
          git diff

      - name: Bump patch version
        run: uv run --frozen bump-my-version bump patch

      - name: DEBUG Git status and diff
        if: always()
        run: |
          git status
          git diff

      - name: Sync uv.lock and amend bump commit
        run: |
          uv sync
          git add uv.lock
          git commit --amend --no-edit

      - name: Push commit and tag
        run: git push --follow-tags
      
      - name: Clean up working directory
        if: always()
        run: git reset --hard HEAD
