name: Bump Version

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  bump:
    name: Bump patch version
    runs-on: ubuntu-latest
    # Skip if the push itself is a version bump commit (contains [skip ci])
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync tags with remote
        run: |
          git tag -l | xargs git tag -d
          git fetch --tags

      - name: Restore uv.lock
        run: git checkout -- uv.lock

      - name: Bump patch version
        run: uv run --frozen bump-my-version bump patch

      - name: DEBUG after bump
        if: always()
        run: |
          echo "=== git log ==="
          git log --oneline -5
          echo "=== local tags ==="
          git tag -l
          echo "=== tag details ==="
          git for-each-ref --format='%(refname:short) -> %(objectname:short) (%(objecttype))' refs/tags
          echo "=== HEAD ==="
          git rev-parse HEAD

      - name: Sync uv.lock and amend bump commit
        run: |
          uv sync
          git add uv.lock
          TAG=$(git describe --tags --abbrev=0)
          git commit --amend --no-edit
          git tag -f "$TAG" HEAD

      - name: DEBUG after amend
        if: always()
        run: |
          echo "=== git log ==="
          git log --oneline -5
          echo "=== local tags ==="
          git tag -l
          echo "=== tag details ==="
          git for-each-ref --format='%(refname:short) -> %(objectname:short) (%(objecttype))' refs/tags
          echo "=== HEAD ==="
          git rev-parse HEAD

      - name: Push commit and tag
        run: git push --follow-tags

      - name: DEBUG after push
        if: always()
        run: |
          echo "=== remote tags ==="
          git ls-remote --tags origin
      
      - name: Clean up working directory
        if: always()
        run: git reset --hard HEAD
